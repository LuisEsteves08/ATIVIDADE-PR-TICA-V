<!DOCTYPE html>

<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro</title>


<link rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">

<style>
    body {
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: linear-gradient(135deg, #1e3c72, #2a5298);
        padding: 20px;
    }

    .card-cadastro {
        width: 100%;
        max-width: 500px;
        background: white;
        padding: 30px;
        border-radius: 16px;
        box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    }

    h2 {
        text-align: center;
        margin-bottom: 25px;
    }

    button {
        width: 100%;
    }

    .login-link {
        text-align: center;
        margin-top: 15px;
    }

    .login-link a {
        text-decoration: none;
        font-weight: bold;
    }
</style>


</head>

<body>


<main class="card-cadastro">

    <h2>Cadastro de Usuário</h2>

    <form action="feed.html" method="get">

        <label for="nome">Nome</label>
        <input type="text" id="nome" name="nome" required minlength="3">

        <label for="email">E-mail</label>
        <input type="email" id="email" name="email" required>

        <label for="usuario">Usuário</label>
        <input type="text" id="usuario" name="usuario" required minlength="4">

        <label for="senha">Senha</label>
        <input type="password" id="senha" name="senha" required minlength="6">

        <label for="confirmarSenha">Confirmar Senha</label>
        <input type="password" id="confirmarSenha" name="confirmarSenha" required minlength="6">

        <label for="genero">Gênero</label>
        <select id="genero" name="genero" required>
            <option value="">Selecione</option>
            <option value="masculino">Masculino</option>
            <option value="feminino">Feminino</option>
            <option value="outro">Outro</option>
            <option value="naoInformar">Prefiro não informar</option>
        </select>

        <label for="nascimento">Data de Nascimento</label>
        <input type="date" id="nascimento" name="nascimento" required>

        <button type="submit">Cadastrar</button>

    </form>

    <div class="login-link">
        <a href="index.html">Já possuo uma conta</a>
    </div>

</main>


</body>
</html>
